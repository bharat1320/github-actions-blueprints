name: Master Android Builder

on:
  workflow_call: # This allows your other repositories to call this script

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout project source code
        uses: actions/checkout@v4

      - name: Set up Java Environment
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Grant Gradle execute permissions
        run: chmod +x ./gradlew

      - name: Compile Debug APK
        run: ./gradlew assembleDebug

      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: compiled-android-apk
          path: app/build/outputs/apk/debug/app-debug.apk
